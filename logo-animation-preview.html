<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>معاينة الشعار المتحرك — صيدلية سما السكر</title>
<style>
  body { margin:0; font-family:system-ui, sans-serif; display:flex; min-height:100vh; }
  .half { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
  .light { background:#FAF7F5; color:#3D2B47; }
  .dark  { background:#1C1223; color:#EBDFF2; }
  .dark svg { filter: drop-shadow(0 0 28px rgba(124,79,136,.35)); }
  svg { width:min(260px, 60vw); will-change:transform; }
  p { font-size:13px; opacity:.6; letter-spacing:.1em; }
</style>
</head>
<body>
<div class="half light"><div id="logoA"></div><p>الوضع الفاتح</p></div>
<div class="half dark"><div id="logoB"></div><p>الوضع الداكن</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const CAPSULE = "M 123.680 25.566 C 105.558 28.385, 80.950 41.118, 63.080 56.922 C 56.391 62.838, 41 81.836, 41 84.177 C 41 84.962, 38.450 90.682, 31.941 104.500 C 30.279 108.027, 27.182 122.199, 25.821 132.500 C 23.659 148.867, 23.989 285.148, 26.223 298.500 C 28.069 309.527, 35.754 333.456, 38.631 337.134 C 39.219 337.885, 40.436 340.019, 41.336 341.876 C 47.575 354.749, 67.339 375.195, 81.765 383.699 C 92.238 389.873, 106.528 396.210, 114 397.993 C 115.925 398.452, 119.300 399.411, 121.500 400.124 C 128.811 402.493, 166.793 401.944, 176.500 399.329 C 198.054 393.524, 217.092 383.140, 231 369.603 C 244.044 356.907, 249.642 349.953, 254.135 340.862 C 255.865 337.363, 258.117 333.427, 259.140 332.115 C 260.163 330.803, 261 328.869, 261 327.815 C 261 326.762, 261.734 324.482, 262.630 322.749 C 264.317 319.486, 265.914 312.952, 268.801 297.500 C 271.084 285.285, 271.352 149.018, 269.127 132 C 266.392 111.082, 261.205 95.063, 253.846 84.810 C 252.556 83.012, 251.050 80.774, 250.500 79.836 C 245.100 70.626, 242.933 67.659, 237.656 62.250 C 234.302 58.812, 231.260 56, 230.897 56 C 230.534 56, 228.046 53.972, 225.368 51.494 C 212.074 39.188, 190.802 28.899, 171.500 25.437 C 161.434 23.632, 135.664 23.701, 123.680 25.566";
const ARC = "M 124 29.935 C 108.875 32.734, 90.056 41.057, 77.544 50.478 C 72.119 54.564, 53 72.630, 53 73.671 C 53 73.912, 51.143 76.844, 48.874 80.186 C 43.293 88.403, 37.669 100.661, 34.566 111.367 C 31.072 123.426, 31.313 125.653, 35.595 120.874 C 39.867 116.108, 58.686 100.457, 69.724 92.490 C 96.655 73.054, 120.470 64.290, 149.072 63.291 C 171.643 62.502, 189.341 66.871, 207.396 77.690 C 224.144 87.726, 247.653 109.788, 259.796 126.865 C 263.573 132.177, 265.311 133.258, 264.592 129.848 C 264.320 128.557, 263.375 123.731, 262.493 119.124 C 254.069 75.155, 214.823 37.472, 169.119 29.468 C 157.759 27.478, 136.057 27.703, 124 29.935";
const FACE = "M 205.446 126.250 C 195.955 142.505, 185.070 154.725, 170.396 165.599 C 151.302 179.748, 142.418 196.517, 142.636 218 C 142.786 232.707, 148.056 246.109, 162.869 269.457 C 174.356 287.562, 178.502 318.305, 172.573 341.421 C 167.284 362.042, 157.588 376.996, 141.070 390.007 C 135.510 394.386, 133.379 396.623, 134.243 397.172 C 138.726 400.017, 169.255 397.094, 184.172 392.391 C 212.108 383.583, 241.555 358.395, 253.670 332.946 C 258.378 323.058, 258.643 323.818, 249.578 321.215 C 230.138 315.632, 217.836 308.732, 205.513 296.500 C 188.900 280.010, 170.043 247.100, 174.597 242.546 C 176.489 240.654, 175.540 240.547, 182.704 243.458 C 191.837 247.169, 205.623 249.448, 210.688 248.084 C 216.524 246.513, 217.492 244.863, 217.549 236.397 C 217.594 229.692, 217.816 228.933, 220.299 226.980 C 222.260 225.437, 223 223.950, 223 221.550 C 223 219.732, 223.723 217.645, 224.607 216.911 C 225.800 215.921, 226.070 214.531, 225.657 211.516 C 224.949 206.349, 225.394 205.725, 231.717 203.016 C 240.398 199.298, 240.344 197.563, 231.091 183.056 C 221.886 168.624, 221.842 168.477, 221.659 151.323 C 221.505 136.989, 221.398 136.285, 218.412 129.983 C 212.764 118.065, 210.591 117.440, 205.446 126.250";
const SPARKLE = "M 98.500 300.591 C 94.948 307.202, 87.905 314.100, 81.560 317.183 C 75.933 319.917, 75.933 320.083, 81.560 322.817 C 87.943 325.918, 95.287 333.105, 98.650 339.541 C 100.218 342.541, 101.725 344.979, 102 344.959 C 102.275 344.939, 103.602 342.660, 104.949 339.895 C 108.178 333.266, 115.383 326.082, 121.815 323.079 C 124.667 321.748, 126.999 320.398, 126.998 320.079 C 126.996 319.761, 124.409 318.159, 121.248 316.521 C 113.974 312.751, 106.694 305.383, 104.458 299.530 C 103.507 297.039, 102.452 295.002, 102.114 295.003 C 101.776 295.005, 100.150 297.520, 98.500 300.591";
const FULL = CAPSULE + " " + ARC + " " + FACE + " " + SPARKLE;
const PURPLE = "#7C4F88", CREAM = "#FBEBEB";

function buildLogo(container, uid) {
  container.innerHTML = `
<svg viewBox="0 0 294 425" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="صيدلية سما السكر">
  <defs>
    <clipPath id="cap${uid}"><path d="${CAPSULE}"/></clipPath>
    <clipPath id="hair${uid}"><rect x="38" y="104" width="122" height="288" rx="24"/></clipPath>
    <filter id="breeze${uid}" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap data-logo-disp in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="shim${uid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A7DC" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#C9A7DC" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C9A7DC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="swp${uid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow${uid}" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5"/></filter>
  </defs>
  <g data-logo-float>
    <g data-logo-art>
      <path d="${CAPSULE}" fill="${CREAM}"/>
      <path d="${FULL}" fill="${PURPLE}" fill-rule="evenodd"/>
      <g clip-path="url(#hair${uid})" filter="url(#breeze${uid})">
        <path d="${CAPSULE}" fill="${CREAM}"/>
        <path d="${FULL}" fill="${PURPLE}" fill-rule="evenodd"/>
      </g>
      <g clip-path="url(#cap${uid})">
        <g clip-path="url(#hair${uid})">
          <rect data-logo-shimmer x="0" y="0" width="300" height="425" fill="url(#shim${uid})"/>
        </g>
        <g transform="skewX(-16)">
          <rect data-logo-sweep x="40" y="-40" width="220" height="520" fill="url(#swp${uid})"/>
        </g>
      </g>
      <path data-logo-sparkle d="${SPARKLE}" fill="#FFF8FC" filter="url(#glow${uid})" opacity="0"/>
    </g>
    <path data-logo-stroke d="${CAPSULE}" fill="none" stroke="${PURPLE}" stroke-width="4" stroke-linecap="round" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
  </g>
</svg>`;

  const q = gsap.utils.selector(container);
  gsap.set(q("[data-logo-art]"), { opacity: 0 });
  gsap.set(q("[data-logo-shimmer]"), { x: -340 });
  gsap.set(q("[data-logo-sweep]"), { x: -420 });

  // INTRO
  const intro = gsap.timeline();
  intro.to(q("[data-logo-stroke]"), { strokeDashoffset: 0, duration: 1.6, ease: "power2.inOut" });
  intro.to(q("[data-logo-art]"), { opacity: 1, duration: 1.0, ease: "sine.inOut" }, 1.15);
  intro.to(q("[data-logo-stroke]"), { opacity: 0, duration: 0.6, ease: "sine.out" }, 1.9);

  // AMBIENT 6s loop
  const amb = gsap.timeline({ paused: true, repeat: -1 });
  amb.to(q("[data-logo-disp]"), { attr: { scale: 2.6 }, duration: 3, ease: "sine.inOut" }, 0)
     .to(q("[data-logo-disp]"), { attr: { scale: 0 }, duration: 3, ease: "sine.inOut" }, 3);
  amb.to(q("[data-logo-shimmer]"), { x: 340, duration: 2.4, ease: "power1.inOut" }, 0.7);
  amb.to(q("[data-logo-sparkle]"), { opacity: 0.95, duration: 0.4, ease: "sine.out" }, 2.7)
     .to(q("[data-logo-sparkle]"), { opacity: 0, duration: 0.7, ease: "sine.in" }, 3.1);
  amb.to(q("[data-logo-sweep]"), { x: 420, duration: 1.25, ease: "power2.inOut" }, 4.1);
  amb.set(q("[data-logo-shimmer]"), { x: -340 }, 5.9);
  amb.set(q("[data-logo-sweep]"), { x: -420 }, 5.9);

  // FLOAT
  gsap.set(q("[data-logo-float]"), { y: -3 });
  const float = gsap.to(q("[data-logo-float]"), { y: 3, duration: 3, ease: "sine.inOut", yoyo: true, repeat: -1, paused: true });

  intro.eventCallback("onComplete", () => { amb.play(); float.play(); });
}

if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
  buildLogo(document.getElementById("logoA"), "A");
  buildLogo(document.getElementById("logoB"), "B");
  gsap.set("[data-logo-art]", { opacity: 1 });
  gsap.set("[data-logo-stroke]", { opacity: 0 });
  gsap.globalTimeline.pause();
} else {
  buildLogo(document.getElementById("logoA"), "A");
  buildLogo(document.getElementById("logoB"), "B");
}
</script>
</body>
</html>
